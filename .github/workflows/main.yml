name: Build PPlay PS4 PKG

on:
  workflow_dispatch:

jobs:
  build-ps4:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build
      OUTPUT_DIR: output

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake build-essential git zip

    - name: Setup OpenOrbis Toolchain
      run: |
        git clone https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git $HOME/openorbis
        echo "OO_PS4_TOOLCHAIN=$HOME/openorbis" >> $GITHUB_ENV
        echo "$HOME/openorbis/bin" >> $GITHUB_PATH

    - name: Configure CMake
      run: |
        cmake -B $BUILD_DIR \
          -DPLATFORM_PS4=ON \
          -DCMAKE_TOOLCHAIN_FILE=$OO_PS4_TOOLCHAIN/toolchain.cmake

    - name: Build Project
      run: |
        cmake --build $BUILD_DIR -j$(nproc)

    - name: Prepare PKG Structure
      run: |
        mkdir -p $OUTPUT_DIR/pkg

        cp $BUILD_DIR/pplay $OUTPUT_DIR/pkg/eboot.bin

        # Copy required PS4 metadata (must exist in repo)
        cp -r assets/sce_sys $OUTPUT_DIR/pkg/ || true

    - name: Create PKG
      run: |
        mkdir -p $OUTPUT_DIR/final
        create-pkg $OUTPUT_DIR/pkg $OUTPUT_DIR/final/pplay.pkg

    - name: Zip PKG
      run: |
        cd $OUTPUT_DIR/final
        zip pplay-ps4.zip pplay.pkg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pplay-ps4
        path: output/final/pplay-ps4.zip
