name: Build PPlay PS4 PKG

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ps4:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build
      OUTPUT_DIR: output

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------
    # Install dependencies
    # ----------------------------
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake build-essential git zip

    # ----------------------------
    # Setup OpenOrbis toolchain
    # ----------------------------
    - name: Setup OpenOrbis
      run: |
        git clone https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git $HOME/openorbis
        echo "OO_PS4_TOOLCHAIN=$HOME/openorbis" >> $GITHUB_ENV
        echo "$HOME/openorbis/bin" >> $GITHUB_PATH

    # ----------------------------
    # Configure CMake
    # ----------------------------
    - name: Configure project
      run: |
        cmake -B $BUILD_DIR \
          -DPLATFORM_PS4=ON \
          -DCMAKE_TOOLCHAIN_FILE=$OO_PS4_TOOLCHAIN/toolchain.cmake

    # ----------------------------
    # Build
    # ----------------------------
    - name: Build project
      run: |
        cmake --build $BUILD_DIR -j$(nproc)

    # ----------------------------
    # Prepare PKG structure
    # ----------------------------
    - name: Prepare package files
      run: |
        mkdir -p $OUTPUT_DIR/pkg

        # Assuming your binary is named pplay
        cp $BUILD_DIR/pplay $OUTPUT_DIR/pkg/eboot.bin

        # You MUST have these in your repo
        cp -r assets/sce_sys $OUTPUT_DIR/pkg/ || true

    # ----------------------------
    # Create PKG
    # ----------------------------
    - name: Build PKG
      run: |
        mkdir -p $OUTPUT_DIR/final

        # OpenOrbis packaging tool
        create-pkg $OUTPUT_DIR/pkg $OUTPUT_DIR/final/pplay.pkg

    # ----------------------------
    # Zip artifact
    # ----------------------------
    - name: Zip PKG
      run: |
        cd $OUTPUT_DIR/final
        zip pplay-ps4.zip pplay.pkg

    # ----------------------------
    # Upload artifact
    # ----------------------------
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pplay-ps4-build
        path: output/final/pplay-ps4.zip
