name: Build PS4 Package

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build-ps4:
    name: Build PS4 PKG
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_TYPE: Release
      PKG_OUTPUT: ${{ github.workspace }}/pkg
      PS4_TOOLCHAIN_IMAGE: ghcr.io/cpasjuste/orbis-toolchain:latest # Example homebrew toolchain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull PS4 toolchain Docker image
        run: |
          docker pull $PS4_TOOLCHAIN_IMAGE

      - name: Build in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            $PS4_TOOLCHAIN_IMAGE /bin/bash -c "\
              apt-get update && apt-get install -y cmake pkg-config libbz2-dev libass-dev libmpv-dev ffmpeg && \
              mkdir -p build && cd build && \
              cmake .. -DPLATFORM_PS4=ON -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE && \
              cmake --build . --config $CMAKE_BUILD_TYPE -j\$(nproc) && \
              mkdir -p $PKG_OUTPUT && \
              ps4-pkg-create --title '${{ github.repository }}' --title-id 'PPLA00001' --version '3.8' --input ./pplay --output $PKG_OUTPUT/pplay.pkg \
            "

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: pplay-ps4-pkg
          path: $PKG_OUTPUT/pplay.pkg
