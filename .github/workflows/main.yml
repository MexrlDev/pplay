name: Build PS4 PKG (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git zip

    - name: Setup OpenOrbis
      run: |
        git clone https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git $HOME/openorbis
        echo "OO_PS4_TOOLCHAIN=$HOME/openorbis" >> $GITHUB_ENV

    - name: Configure
      run: |
        cmake -B $BUILD_DIR -G Ninja \
          -DPLATFORM_PS4=ON \
          -DCMAKE_TOOLCHAIN_FILE=$OO_PS4_TOOLCHAIN/toolchain/prospero.cmake

    - name: Build
      run: |
        cmake --build $BUILD_DIR

    - name: Debug output
      run: |
        ls -R $BUILD_DIR
